services:
  db:
    image: postgres:15-alpine
    container_name: netmonitor_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: netmonitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./documents/db.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: netmonitor_backend
    restart: always
    ports:
      - "5000:5000"
      - "514:514/udp"
    environment:
      PORT: 5000
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: netmonitor
      DB_PASSWORD: postgres
      DB_PORT: 5432
      ENABLE_SIMULATOR: 'true'
      SNMP_COMMUNITY: 'darn@2026'
      SYSLOG_PORT: 514
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: netmonitor_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
